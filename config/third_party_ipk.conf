# 第三方 ipk 配置文件
# 格式: GITHUB_REPO|ASSET_PATTERN|PACKAGE_NAME|NEED_LANG_PACK
# 
# 参数说明:
#   GITHUB_REPO: GitHub 仓库路径，格式: owner/repo
#   ASSET_PATTERN: 匹配 asset 文件名的关键词（支持通配符 *）
#   PACKAGE_NAME: ipk 包名（用于添加到 custom_packages.txt）
#   NEED_LANG_PACK: 是否需要自动下载中文语言包 (true/false)
#
# 示例:
#   jerrykuku/luci-theme-argon|luci-theme-argon-|luci-theme-argon|true
#   jerrykuku/luci-app-argon-config|luci-app-argon-config-|luci-app-argon-config|true
#   fw876/helloworld|luci-app-passwall|luci-app-passwall|true

# 主题类
jerrykuku/luci-theme-argon|luci-theme-argon-|luci-theme-argon|true
jerrykuku/luci-app-argon-config|luci-app-argon-config-|luci-app-argon-config|true

# 科学上网类（示例，需要自行填写有效的仓库）
# vernesong/OpenClash|luci-app-openclash|luci-app-openclash|true

# 下载工具类（示例）
# aria2/aria2|aria2-|aria2|false

# 系统增强类（示例）
# adguardhome/adguardhome|luci-app-adguardhome|luci-app-adguardhome|true

name: 清理 Releases 发布包

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: '保留最新的 Release 数量'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
          - '20'
      delete_tags:
        description: '是否同时删除关联的 Git 标签'
        required: false
        type: boolean
        default: false
      dry_run:
        description: '仅预览将要删除的 Release（不实际删除）'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  cleanup-releases:
    name: 清理 Releases 发布包
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取所有 Releases
        id: get-releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取所有 releases，按创建时间排序
          releases=$(gh api repos/${{ github.repository }}/releases --paginate | jq -r '.[] | "\(.id)|\(.tag_name)|\(.created_at)"' | sort -t'|' -k3 -r)
          
          total=$(echo "$releases" | wc -l)
          keep=${{ github.event.inputs.keep_latest }}
          delete_count=$((total - keep))
          
          if [ "$delete_count" -le 0 ]; then
            echo "✅ 当前 Release 数量 ($total) 未超过保留数量 ($keep)，无需删除"
            echo "delete_list=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 获取需要删除的 release IDs
          delete_list=$(echo "$releases" | tail -n $delete_count | cut -d'|' -f1 | tr '\n' ',' | sed 's/,$//')
          echo "delete_list=$delete_list" >> $GITHUB_OUTPUT
          
          echo "📊 当前 Release 总数: $total"
          echo "📦 保留数量: $keep"
          echo "🗑️ 将删除数量: $delete_count"

      - name: 预览将要删除的 Releases
        if: github.event.inputs.dry_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${{ steps.get-releases.outputs.delete_list }}" ]; then
            echo "✅ 没有需要删除的 Release"
            exit 0
          fi
          
          echo "🔍 预览模式 - 以下 Release 将被删除："
          IFS=',' read -ra IDS <<< "${{ steps.get-releases.outputs.delete_list }}"
          for id in "${IDS[@]}"; do
            gh api repos/${{ github.repository }}/releases/$id | jq -r '"🗑️ [\(.tag_name)] - 创建于: \(.created_at)"'
          done

      - name: 删除旧的 Releases
        if: github.event.inputs.dry_run == 'false' && steps.get-releases.outputs.delete_list != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IFS=',' read -ra IDS <<< "${{ steps.get-releases.outputs.delete_list }}"
          
          for id in "${IDS[@]}"; do
            release_info=$(gh api repos/${{ github.repository }}/releases/$id | jq -r '.tag_name')
            echo "🗑️ 正在删除 Release: $release_info"
            gh api -X DELETE repos/${{ github.repository }}/releases/$id
          done
          
          echo "✅ Release 清理完成"

      - name: 删除关联的 Git 标签
        if: github.event.inputs.dry_run == 'false' && github.event.inputs.delete_tags == 'true' && steps.get-releases.outputs.delete_list != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IFS=',' read -ra IDS <<< "${{ steps.get-releases.outputs.delete_list }}"
          
          for id in "${IDS[@]}"; do
            tag_name=$(gh api repos/${{ github.repository }}/releases/$id --jq '.tag_name' 2>/dev/null || echo "")
            if [ -n "$tag_name" ]; then
              echo "🏷️ 正在删除标签: $tag_name"
              git push --delete origin "$tag_name" 2>/dev/null || echo "⚠️ 标签 $tag_name 删除失败"
            fi
          done
          
          echo "✅ 标签清理完成"

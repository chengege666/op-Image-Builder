name: 清理已执行的工作流（保留最近30分钟）

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    name: 清理工作流运行记录
    runs-on: ubuntu-latest
    steps:
      - name: 清理30分钟之前的工作流运行记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          CUTOFF=$(date -d '30 minutes ago' -u +%s)
          
          echo "=== 清理配置 ==="
          echo "仓库: $REPO"
          echo "删除 $(date -d '30 minutes ago' -u '+%Y-%m-%d %H:%M:%S UTC') 之前的运行记录"
          echo ""
          
          # 获取所有工作流 ID 和名称
          gh api "/repos/$REPO/actions/workflows" --jq '.workflows[] | "\(.id):\(.name)"' | while IFS=: read -r workflow_id workflow_name; do
             echo "📋 处理工作流: $workflow_name (ID: $workflow_id)"
             
             # 获取该工作流的所有运行记录（自动分页）
             gh api --paginate "/repos/$REPO/actions/workflows/$workflow_id/runs?per_page=100" --jq '.workflow_runs[] | "\(.id)|\(.created_at)|\(.head_branch)|\(.display_title)"' | while IFS='|' read -r run_id created_at branch title; do
                RUN_TIMESTAMP=$(date -d "$created_at" -u +%s)
                
                if [ "$RUN_TIMESTAMP" -lt "$CUTOFF" ]; then
                   echo "   🗑️  删除 #$run_id [$branch] $title (创建于 $created_at)"
                   gh api -X DELETE "/repos/$REPO/actions/runs/$run_id" --silent
                fi
             done
          done
          
          echo ""
          echo "✅ 清理完成"

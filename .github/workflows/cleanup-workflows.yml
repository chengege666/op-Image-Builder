name: 清理已执行的工作流

on:
  workflow_dispatch:
    inputs:
      days:
        description: '删除多少天之前的工作流运行记录'
        required: true
        default: '7'
        type: choice
        options:
          - '1'
          - '3'
          - '7'
          - '14'
          - '30'
      keep_minimum_runs:
        description: '每个工作流保留的最少运行记录数'
        required: true
        default: '5'
        type: choice
        options:
          - '0'
          - '3'
          - '5'
          - '10'
      dry_run:
        description: '仅预览将要删除的记录（不实际删除）'
        required: false
        type: boolean
        default: true

permissions:
  actions: write

jobs:
  cleanup:
    name: 清理工作流运行记录
    runs-on: ubuntu-latest
    steps:
      - name: 清理工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.days }}
          keep_minimum_runs: ${{ github.event.inputs.keep_minimum_runs }}
          dry_run: ${{ github.event.inputs.dry_run }}

      - name: 输出清理结果
        if: github.event.inputs.dry_run == 'false'
        run: |
          echo "✅ 工作流清理完成"
          echo "📅 删除了 ${{ github.event.inputs.days }} 天之前的运行记录"
          echo "📦 每个工作流保留最少 ${{ github.event.inputs.keep_minimum_runs }} 条记录"

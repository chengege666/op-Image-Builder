name: 构建 ImmortalWrt x86-64 (Image Builder)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '固件构建类型'
        required: true
        default: 'squashfs_ext4 (物理机/通用)'
        type: choice
        options:
          - 'squashfs_ext4 (物理机/通用)'
          - 'iso (虚拟机/光盘)'
          - 'rootfs (容器/LXC)'
      immortalwrt_version:
        description: 'ImmortalWrt 版本'
        required: true
        default: '24.10.5'
        type: choice
        options:
          - '24.10.5'
          - '24.10.4'
          - '24.10.3'
          - 'SNAPSHOT'
      auto_release:
        description: '构建成功后是否自动发布到 GitHub Release'
        required: false
        type: boolean
        default: false
      lan_ip:
        description: '路由器管理地址 (LAN IP)'
        required: true
        default: '192.168.1.1'
      enable_store:
        description: '启用应用商店 (iStore)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化构建环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 zstd genisoimage xorriso mtools

      - name: 获取版本并下载 Image Builder
        run: |
          VERSION="${{ github.event.inputs.immortalwrt_version }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          if [ "$VERSION" == "SNAPSHOT" ]; then
             IB_URL="https://downloads.immortalwrt.org/snapshots/targets/x86/64/immortalwrt-imagebuilder-x86-64.Linux-x86_64.tar.zst"
          else
             IB_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/x86/64/immortalwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64.tar.zst"
          fi
          
          wget -qO ib.tar.zst "$IB_URL"
          mkdir -p immortalwrt-ib
          tar -I zstd -xf ib.tar.zst -C immortalwrt-ib --strip-components=1

      - name: 配置构建参数
        working-directory: ./immortalwrt-ib
        run: |
          # 清除旧的配置
          rm -f .config
          
          # 基础包列表 (精简且兼容性强的集合)
          PACKAGES="luci luci-ssl luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
          luci-app-ttyd luci-i18n-ttyd-zh-cn \
          bash curl wget-ssl tar unzip \
          kmod-usb-storage kmod-usb-storage-uas kmod-fs-ext4 kmod-fs-vfat kmod-fs-exfat \
          block-mount fdisk e2fsprogs lsblk parted"

          # 动态添加 iStore
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
             PACKAGES="$PACKAGES luci-app-store"
          fi
          
          # 写入环境变量供下一步使用
          echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
          
          # 如果是 ISO 模式
          if [[ "${{ github.event.inputs.build_type }}" == *"iso"* ]]; then
             echo "CONFIG_ISO_IMAGES=y" >> .config
          fi

      - name: 生成固件
        working-directory: ./immortalwrt-ib
        run: |
          # 使用 V=s 输出详细错误，方便排查
          make image PACKAGES="$PACKAGES" FILES="files" V=s

      - name: 整理构建产物
        run: |
          mkdir -p firmware
          # 查找所有 img/iso/tar.gz 文件并复制
          find immortalwrt-ib/bin/targets/x86/64 -maxdepth 1 \( -name "*.img.*" -o -name "*.iso" -o -name "*rootfs.tar.gz" \) -exec cp {} firmware/ \;
          
          cd firmware
          VERSION="${{ github.event.inputs.immortalwrt_version }}"
          zip -r "ImmortalWrt_x86_64_${VERSION}.zip" ./*

      - name: 上传固件 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_x86_64_Firmware
          path: firmware/*.zip

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event.inputs.auto_release == 'true' }}
        with:
          tag_name: build-${{ github.run_id }}
          name: ImmortalWrt ${{ env.VERSION }} x86_64
          files: firmware/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: 构建 OpenWrt 25.12.x

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '固件构建类型'
        required: true
        default: 'squashfs_ext4 (物理机/通用)'
        type: choice
        options:
          - 'squashfs_ext4 (物理机/通用)'
          - 'rootfs (容器/LXC)'
      version:
        description: 'OpenWrt 版本'
        required: true
        default: '25.12.4'
        type: choice
        options:
          - '25.12.4'
          - '25.12.3'
      auto_release:
        description: '构建成功后是否自动发布到 GitHub Release'
        required: false
        type: boolean
        default: false
      firmware_size:
        description: '固件大小 (MB) [选 rootfs 时此项无效] [选"默认"则使用 1024MB]'
        required: false
        default: '默认'
        type: choice
        options:
          - '默认'
          - '512'
          - '1024'
          - '2048'
          - '4096'
          - '自定义'
      custom_firmware_size:
        description: '自定义固件大小 (MB) [当选中"自定义"时生效]'
        required: false
        default: '5120'
      lan_ip:
        description: '路由器管理地址 (LAN IP)'
        required: true
        default: '192.168.1.1'
      enable_aurora:
        description: 'aurora 主题'
        required: false
        type: boolean
        default: false
      enable_run_installer:
        description: '启用 .Run 安装器'
        required: false
        type: boolean
        default: false
      enable_pppoe:
        description: '启用 PPPoE 拨号配置'
        required: false
        type: boolean
        default: false
      pppoe_username:
        description: 'PPPoE 用户名'
        required: false
      pppoe_password:
        description: 'PPPoE 密码'
        required: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化构建环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 python3-setuptools python3-pyelftools zstd genisoimage xorriso mtools qemu-utils

      - name: 下载 Image Builder
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          # 25.12.x 版本及之后通常使用 tar.zst
          # 尝试下载 .zst，如果失败尝试 .xz
          IB_BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/x86/64"
          IB_FILE_PREFIX="openwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64"
          
          echo "正在尝试下载 Image Builder..."
          echo "版本: $VERSION"
          
          if wget -q --spider "${IB_BASE_URL}/${IB_FILE_PREFIX}.tar.zst"; then
             FILE_EXT="tar.zst"
          else
             FILE_EXT="tar.xz"
          fi
          
          IB_URL="${IB_BASE_URL}/${IB_FILE_PREFIX}.${FILE_EXT}"
          echo "下载地址: $IB_URL"
          
          if ! wget -qO openwrt-ib.${FILE_EXT} "$IB_URL"; then
             echo "Error: 下载失败！请检查版本号 $VERSION 是否存在。"
             exit 1
          fi
          
          echo "正在解压..."
          mkdir -p openwrt-ib
          if [[ "$FILE_EXT" == "tar.zst" ]]; then
            tar -I zstd -xf openwrt-ib.${FILE_EXT} -C openwrt-ib --strip-components=1
          else
            tar -xf openwrt-ib.${FILE_EXT} -C openwrt-ib --strip-components=1
          fi

      - name: 配置构建参数
        working-directory: ./openwrt-ib
        env:
          LAN_IP: ${{ github.event.inputs.lan_ip }}
          FIRMWARE_SIZE: ${{ github.event.inputs.firmware_size }}
          CUSTOM_FIRMWARE_SIZE: ${{ github.event.inputs.custom_firmware_size }}
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
          ENABLE_AURORA: ${{ github.event.inputs.enable_aurora }}
          ENABLE_RUN_INSTALLER: ${{ github.event.inputs.enable_run_installer }}
          ENABLE_PPPOE: ${{ github.event.inputs.enable_pppoe }}
          PPPOE_USER: ${{ github.event.inputs.pppoe_username }}
          PPPOE_PASS: ${{ github.event.inputs.pppoe_password }}
        run: |
          # 【关键修改】rootfs 模式下跳过固件大小处理
          if [[ "${BUILD_TYPE}" == *"rootfs"* ]]; then
             echo "检测到 rootfs 构建类型，忽略用户选择的固件大小（rootfs 大小由 Image Builder 默认决定）。"
             echo "FIRMWARE_SIZE=N/A" >> $GITHUB_ENV
          else
             # 选择"默认"则使用 1024 MB
             if [ "${FIRMWARE_SIZE}" == "默认" ]; then
                echo "选择默认分区大小，使用 1024 MB。"
                export FIRMWARE_SIZE="1024"
             elif [ "${FIRMWARE_SIZE}" == "自定义" ]; then
                if ! [[ "${CUSTOM_FIRMWARE_SIZE}" =~ ^[0-9]+$ ]]; then
                   echo "❌ 错误：自定义固件大小必须为数字（MB），当前值：${CUSTOM_FIRMWARE_SIZE}"
                   exit 1
                fi
                echo "使用自定义固件大小: ${CUSTOM_FIRMWARE_SIZE} MB"
                export FIRMWARE_SIZE="${CUSTOM_FIRMWARE_SIZE}"
             fi
             echo "FIRMWARE_SIZE=$FIRMWARE_SIZE" >> $GITHUB_ENV
          fi
          
          mkdir -p files/etc/uci-defaults
          touch custom_packages.txt

          # 确保脚本存在并赋予执行权限
          if ls ../scripts/*.sh 1> /dev/null 2>&1; then
             chmod +x ../scripts/*.sh
             [ -f ../scripts/set_ip.sh ] && ../scripts/set_ip.sh
             
             # 如果不是纯 rootfs 模式，则设置分区大小
             if [[ "${BUILD_TYPE}" != *"rootfs"* ]] && [ -f ../scripts/set_partition.sh ]; then
                 ../scripts/set_partition.sh
             fi
             
             # 配置 PPPoE 拨号
             [ -f ../scripts/set_pppoe.sh ] && ../scripts/set_pppoe.sh
          fi

          # 配置 LuCI 主题
          echo "aurora 主题: ${ENABLE_AURORA}"

          # ---------- 安装主题包 ----------
          # aurora 主题（第三方，从 GitHub Release 下载）
          if [ "${ENABLE_AURORA}" == "true" ]; then
            echo "正在下载 Aurora 主题包..."
            mkdir -p files/root
            wget -qO files/root/luci-theme-aurora.apk \
              https://github.com/eamonxg/luci-theme-aurora/releases/latest/download/luci-theme-aurora-0.12.0-r20260531.apk
            echo "✓ aurora 主题包已下载到 files/root/"

            # 单独创建安装脚本，不依赖默认主题设置
            printf '%s\n' '#!/bin/sh' \
              'apk add --allow-untrusted /root/luci-theme-aurora.apk 2>/dev/null' \
              'rm -f /root/luci-theme-aurora.apk' \
              'exit 0' > files/etc/uci-defaults/98-aurora-install
            chmod +x files/etc/uci-defaults/98-aurora-install
            echo "✓ aurora 安装脚本已创建"
          fi

          # ---------- 安装 .Run 安装器 ----------
          if [ "${ENABLE_RUN_INSTALLER}" == "true" ]; then
            echo "正在下载 .Run 安装器..."
            mkdir -p files/root
            # 获取最新 release 的 apk 下载链接
            RUN_APK_URL=$(curl -s https://api.github.com/repos/chengege666/apk-run/releases/latest | grep "browser_download_url.*\.apk" | cut -d '"' -f 4)
            if [ -n "$RUN_APK_URL" ]; then
              wget -qO files/root/luci-app-run.apk "$RUN_APK_URL"
              echo "✓ .Run 安装器已下载"
              
              # 创建安装脚本并修改菜单名称
              printf '%s\n' '#!/bin/sh' \
                'apk add --allow-untrusted /root/luci-app-run.apk 2>/dev/null' \
                'rm -f /root/luci-app-run.apk' \
                'if [ -f /usr/share/luci/menu.d/luci-app-run.json ]; then' \
                '  sed -i "s/Run安装工具/.Run安装器/g" /usr/share/luci/menu.d/luci-app-run.json' \
                'fi' \
                'exit 0' > files/etc/uci-defaults/98-run-installer-install
              chmod +x files/etc/uci-defaults/98-run-installer-install
              echo "✓ .Run 安装器安装脚本已创建"
            else
              echo "⚠️ 未找到 .Run 安装器下载链接"
            fi
          fi

          # ---------- 设置默认主题 ----------
          # 优先级：aurora > bootstrap
          if [ "${ENABLE_AURORA}" == "true" ]; then
            printf '%s\n' '#!/bin/sh' \
              'uci set luci.main.mediaurlbase="/luci-static/aurora"' \
              'uci commit luci' \
              'exit 0' > files/etc/uci-defaults/99-theme
            chmod +x files/etc/uci-defaults/99-theme
            echo "默认主题: aurora"
          else
            printf '%s\n' '#!/bin/sh' \
              'uci set luci.main.mediaurlbase="/luci-static/bootstrap"' \
              'uci commit luci' \
              'exit 0' > files/etc/uci-defaults/99-theme
            chmod +x files/etc/uci-defaults/99-theme
            echo "默认主题: bootstrap"
          fi

          # 基础包列表 - 补全网卡驱动和核心组件
          BASE_PACKAGES="luci luci-base luci-ssl uhttpd uhttpd-mod-ubus \
          luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
          luci-app-ttyd luci-i18n-ttyd-zh-cn \
          luci-app-opkg \
          openssh-sftp-server \
          bash curl wget-ssl tar unzip bind-dig \
          kmod-usb-storage kmod-usb-storage-uas kmod-fs-ext4 kmod-fs-vfat kmod-fs-exfat \
          block-mount fdisk e2fsprogs lsblk parted \
          kmod-e1000e kmod-r8169 kmod-igc kmod-ixgbe kmod-i40e \
          luci-i18n-package-manager-zh-cn"

          [ -f .config ] || touch .config
          
          # 追加基础配置
          if [ -f ../config/base.config ]; then
             cat ../config/base.config >> .config
          fi
          
          CUSTOM_PACKAGES=$(cat custom_packages.txt | tr '\n' ' ')
          echo "PACKAGES=$BASE_PACKAGES $CUSTOM_PACKAGES" >> $GITHUB_ENV

      - name: 生成固件
        working-directory: ./openwrt-ib
        run: |
          make image PACKAGES="$PACKAGES" FILES="files"

      - name: 整理构建产物
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          mkdir -p firmware
          
          echo "=== 诊断信息 ==="
          echo "选择的构建类型: ${BUILD_TYPE}"
          
          echo "=== Image Builder 输出的构建结果 ==="
          ls -lh openwrt-ib/bin/targets/x86/64/ || true
          echo "==================================="
          
          if [[ "${BUILD_TYPE}" == *"squashfs_ext4"* ]]; then
             echo "➡️ 常规模式，保留 .img.* 固件文件..."
             find openwrt-ib/bin/targets/x86/64 -name "*.img.*" ! -name "*rootfs*" ! -name "*targz*" -exec cp {} firmware/ \;
          elif [[ "${BUILD_TYPE}" == *"rootfs"* ]]; then
             echo "➡️ Rootfs 模式，保留 rootfs 文件..."
             find openwrt-ib/bin/targets/x86/64 -name "*rootfs.tar.gz" -exec cp {} firmware/ \;
          else
             echo "⚠️ 未知的构建类型！将复制所有镜像文件..."
             find openwrt-ib/bin/targets/x86/64 -name "*.img.*" -exec cp {} firmware/ \;
          fi
          
          echo "➡️ 提取附加信息文件..."
          cp openwrt-ib/bin/targets/x86/64/sha256sums firmware/ 2>/dev/null || true
          cp openwrt-ib/bin/targets/x86/64/profiles.json firmware/ 2>/dev/null || true
          
          cd firmware
          echo "=== 准备打包的文件 ==="
          ls -lh
          
          if [ -z "$(ls -A .)" ]; then
              echo "Error: 在 firmware 目录中没有找到任何文件！请检查上面 if 匹配逻辑。"
              exit 1
          fi
          
          zip -r "OpenWrt_x86_64_${VERSION}.zip" ./*

      - name: 上传固件 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_x86_64_Firmware
          path: firmware/

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event.inputs.auto_release == 'true'
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.run_id }}
          name: OpenWrt ${{ github.event.inputs.version }} x86_64
          generate_release_notes: false
          make_latest: false
          body: |
            OpenWrt x86_64 固件
            版本: ${{ github.event.inputs.version }}
            类型: ${{ github.event.inputs.build_type }}
            主题: ${{ github.event.inputs.enable_aurora == 'true' && 'aurora' || 'bootstrap' }}
            管理地址: ${{ github.event.inputs.lan_ip }}
            用户名: root
            密码: (无)
            固件大小: ${{ env.FIRMWARE_SIZE }}MB
            PPPoE: ${{ github.event.inputs.enable_pppoe == 'true' && '已启用' || '未启用' }}
            
            ---
            📖 固件说明
            ${{ contains(github.event.inputs.build_type, 'rootfs') && '• rootfs: 容器/LXC 专用固件' || '• EFI 固件（-efi）: 支持 UEFI 启动，适用于现代主板' }}
            ${{ contains(github.event.inputs.build_type, 'rootfs') && '• 适用于 Docker、LXC 等容器环境' || '• BIOS 固件: 支持 Legacy 启动，适用于老主板' }}
            ${{ contains(github.event.inputs.build_type, 'rootfs') && '• 不支持直接刷入物理机' || '• squashfs: 只读压缩系统分区' }}
            ${{ contains(github.event.inputs.build_type, 'rootfs') && '' || '• ext4: 可读写用户分区' }}
          files: firmware/*
          fail_on_unmatched_files: true
